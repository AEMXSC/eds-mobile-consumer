/* ---- Helpers ---- */
function strip(h){ return (h||"").replace(/<[^>]*>/g,"").replace(/&amp;/g,"&").replace(/&nbsp;/g," ").trim(); }

function flattenHtml2Json(data) {
  // Format 1: body.children (standard html2json)
  if (data?.body?.children) return data.body.children;
  // Format 2: content[].section[][] (compact html2json)
  if (Array.isArray(data?.content)) {
    const items = [];
    for (const sec of data.content) {
      if (Array.isArray(sec?.section)) {
        for (const row of sec.section) {
          if (Array.isArray(row)) items.push(...row.filter(Boolean));
          else if (row) items.push(row);
        }
      } else if (sec?.tag || sec?.name || sec?.type) {
        items.push(sec);
      }
    }
    return items;
  }
  if (Array.isArray(data)) return data;
  return [];
}

function buildSections(items) {
  const s = []; let hero = false;
  items.forEach(it => {
    if (!it) return;
    const tag = it.tag || it.type || "";
    const name = (it.name || it.blockName || "").toLowerCase();
    if (!hero && (tag === "h1" || it.headingLevel === 1)) {
      s.push({ t:"hero", title:strip(it.innerHTML||it.text||""), sub:"", img:null });
      hero = true;
    } else if (tag === "h1" || tag === "h2" || it.headingLevel <= 2) {
      s.push({ t:"text", h:strip(it.innerHTML||it.text||""), b:"" });
    } else if ((tag === "p" || tag === "paragraph") && s.length) {
      const l = s[s.length - 1];
      const key = l.t === "hero" ? "sub" : "b";
      l[key] = ((l[key]||"") + " " + strip(it.innerHTML||it.text||"")).trim();
    } else if (tag === "img" && s.length && s[s.length-1].t === "hero") {
      s[s.length-1].img = it.src || it.href || null;
    } else if (name === "cards" || name === "columns") {
      const ch = it.children || it.rows || [];
      const ci = ch.map(r => {
        const c = r.columns || r.children || r || [];
        return { title:strip(c[0]?.innerHTML||""), desc:strip(c[1]?.innerHTML||""), img:null };
      }).filter(x => x.title);
      if (ci.length) s.push({ t:"cards", items:ci });
    } else if (name && name !== "section-metadata" && name !== "metadata") {
      // unknown block — show as a placeholder
      s.push({ t:"block", name });
    }
  });
  return s;
}

function parseResponse(data, hintMode) {
  // Sheet mode: EDS spreadsheet JSON
  if (hintMode === "sheet" || (data?.data && Array.isArray(data.data))) {
    if (data?.data?.length) return { mode:"sheet", rows:data.data };
    return SAMPLE_SHEET;
  }
  // Page mode
  const items = flattenHtml2Json(data);
  const sections = buildSections(items);
  return { mode:"page", sections: sections.length ? sections : SAMPLE_PAGE.sections };
}

/* ---- Badge colors by account type ---- */

  if (t === "credit")   return { bg:"#162121", text:"#c5a059" };
  return { bg:"#1a1a1a", text:"#f5f2ed" };
}

/* ---- Phone screen content (dispatches by mode) ---- */
function PhoneScreen({ parsed, activeRow, onRowSelect, loading }) {
  if (loading) {
    return (
      <div style={{padding:"80px 20px",textAlign:"center"}}>
        <div style={{width:26,height:26,border:"3px solid #e8e0d8",borderTopColor:"#a14f2b",borderRadius:"50%",animation:"spin .7s linear infinite",margin:"0 auto 12px"}}/>
        <p style={{fontSize:12,color:"#8a7a6e",fontFamily:"Montserrat,sans-serif"}}>Fetching…</p>
      </div>
    );
  }

  if (!parsed) {
    return (
      <div style={{padding:"80px 20px",textAlign:"center"}}>
        <p style={{fontSize:12,color:"#8a7a6e",fontFamily:"Montserrat,sans-serif"}}>Hit Fetch to load content</p>
      </div>
    );
  }

  if (parsed.mode === "sheet") {
    const rows = parsed.rows || [];
    const row  = rows[activeRow] || rows[0] || {};
    return (
      <div style={{height:"100%",display:"flex",flexDirection:"column"}}>
        {rows.length > 1 && (
          <RowSelector rows={rows} active={activeRow} onSelect={onRowSelect} />
        )}
        <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
          <OfferCard row={row} />
        </div>
      </div>
    );
  }

  // Page mode
  return (
    <div style={{height:"100%",overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
      <PageUI sections={parsed.sections} loading={false} />
    </div>
  );
}

/* ---- Main App ---- */
function App() {
  const [url,        setUrl]        = useState(PRESETS[0].url);
  const [active,     setActive]     = useState("offers");
  const [hintMode,   setHintMode]   = useState("sheet");
  const [parsed,     setParsed]     = useState(SAMPLE_SHEET);
  const [activeRow,  setActiveRow]  = useState(0);
  const [loading,    setLoading]    = useState(false);
  const [status,     setStatus]     = useState("cached");
  const [ts,         setTs]         = useState(null);
  const [rawJson,    setRawJson]    = useState(null);
  const [showRaw,    setShowRaw]    = useState(false);

  const mono = "'DM Mono',monospace";

  const doFetch = useCallback(async () => {
    setLoading(true); setStatus(null);
    const u = url.trim();
    const hint = hintMode;

    const tryParse = (d) => {
      try { return parseResponse(d, hint); } catch(_) { return null; }
    };

    // Direct fetch
    try {
      const r = await fetch(u, { headers:{ accept:"application/json" } });
      if (r.ok) {
        const d = await r.json();
        const p = tryParse(d);
        if (p) {
          setRawJson(d); setParsed(p); setActiveRow(0);
          setTs(new Date().toLocaleTimeString()); setStatus("live");
          setLoading(false); return;
        }
      }
    } catch(_) {}

    // Proxy fallback
    for (const proxy of PROXIES) {
      try {
        const r = await fetch(proxy(u), { headers:{ accept:"application/json" } });
        if (r.ok) {
          const raw = await r.text();
          const d = JSON.parse(raw);
          const p = tryParse(d);
          if (p) {
            setRawJson(d); setParsed(p); setActiveRow(0);
            setTs(new Date().toLocaleTimeString()); setStatus("proxy");
            setLoading(false); return;
          }
        }
      } catch(_) {}
    }

    // Fallback to sample
    const fallback = hint === "sheet" ? SAMPLE_SHEET : SAMPLE_PAGE;
    setParsed(fallback); setActiveRow(0);
    setTs(new Date().toLocaleTimeString() + " (cached)"); setStatus("cached");
    setLoading(false);
  }, [url, hintMode]);

  const pick = (p) => {
    setActive(p.id); setUrl(p.url); setHintMode(p.mode);
    setRawJson(null); setStatus(null); setParsed(null); setActiveRow(0);

);

// Persisted query (registered in AEM):
// query AccountOffers($variation: String!) {

//     items {
//       title
//       offerText
//       details { plaintext }

// }`;

  return (

        <p style={{fontSize:11.5,color:"#86868B",margin:"2px 0 0"}}>Author in DA. Consume anywhere. One fetch call.</p>
      </div>

      {/* URL Bar */}
      <div style={{padding:"12px 28px",background:"#fff",borderBottom:"1px solid #E5E5EA"}}>
        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:10}}>
          <input
            value={url}
            onChange={e => { setUrl(e.target.value); setActive(null); }}
            onKeyDown={e => { if(e.key==="Enter") doFetch(); }}
            placeholder="https://main--repo--org.aem.live/path.json  or  html2json URL"
            style={{
              flex:1, background:"#1D1D1F", border:"1.5px solid #333",
              borderRadius:10, padding:"10px 14px", color:"#30D158",
              fontSize:12.5, fontFamily:mono, outline:"none",
            }}
          />
          <button onClick={doFetch} disabled={loading} style={{
            background:loading?"#B0B0B8":"#a14f2b",color:"#fff",border:"none",
            borderRadius:10,padding:"10px 20px",fontSize:13,fontWeight:700,
            cursor:loading?"wait":"pointer",fontFamily:"'DM Sans',sans-serif",whiteSpace:"nowrap",
          }}>{loading?"Fetching…":"⟳ Fetch"}</button>
        </div>

        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
          <span style={{fontSize:9.5,color:"#86868B",fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",fontFamily:mono}}>Presets:</span>
          {PRESETS.map(p => (
            <button key={p.id} onClick={() => pick(p)} style={{
              background: active===p.id ? "#1D1D1F" : "#E8E8ED",
              color:       active===p.id ? "#fff"    : "#636366",
              border:"none", borderRadius:6, padding:"5px 12px",
              fontSize:11, fontWeight:600, cursor:"pointer",
              fontFamily:mono, transition:"all .15s",
            }}>{p.label}</button>
          ))}

          {/* Mode toggle */}
          <div style={{marginLeft:8,display:"flex",gap:4,alignItems:"center"}}>
            {["sheet","page"].map(m => (
              <button key={m} onClick={() => setHintMode(m)} style={{
                background: hintMode===m ? "#a14f2b" : "transparent",
                color:       hintMode===m ? "#fff"    : "#a14f2b",
                border:"1px solid #a14f2b", borderRadius:5,
                padding:"3px 9px", fontSize:10, fontWeight:600, cursor:"pointer",
                fontFamily:mono, transition:"all .15s",
              }}>{m}</button>
            ))}
          </div>

          {status && (
            <span style={{
              marginLeft:"auto", fontSize:10, fontFamily:mono, fontWeight:600,
              padding:"3px 10px", borderRadius:5, letterSpacing:".04em", textTransform:"uppercase",
              background: status==="live"?"#D1FAE5":status==="proxy"?"#FEF3C7":"#FEE2E2",
              color:       status==="live"?"#065F46":status==="proxy"?"#92400E":"#991B1B",
            }}>
              {status==="live"?"✓ live":status==="proxy"?"⚡ proxy":"⚠ cached sample"}
            </span>
          )}
        </div>
      </div>

      {/* Main layout */}
      <div style={{display:"flex",gap:0,minHeight:"calc(100vh - 148px)"}}>

        {/* Left — code story */}
        <div style={{flex:1,padding:"22px 28px",overflow:"auto"}}>

          {/* EDS fetch */}
          <div style={{marginBottom:22}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:"#34C759"}}/>
              <span style={{fontSize:13.5,fontWeight:700}}>EDS {parsed?.mode==="sheet"?"Spreadsheet":"html2json"}</span>
              <span style={{fontSize:9.5,fontWeight:700,background:"#D1FAE5",color:"#065F46",padding:"2px 8px",borderRadius:4,fontFamily:mono}}>
                {parsed?.mode==="sheet"?"sheet.json — 1 line":"html2json — 1 line"}
              </span>
            </div>
            <div style={{background:"#1D1D1F",borderRadius:12,padding:"14px 18px",overflow:"auto"}}>
              <pre style={{margin:0,fontSize:12,lineHeight:1.7,fontFamily:mono,color:"#E8E8ED",whiteSpace:"pre-wrap",wordBreak:"break-all"}}>
                <span style={{color:"#FF9F0A"}}>const </span>
                <span style={{color:"#64D2FF"}}>content</span>
                <span> = </span>
                <span style={{color:"#FF9F0A"}}>await </span>
                <span style={{color:"#BF5AF2"}}>fetch</span>
                <span>(</span>
                <span style={{color:"#30D158"}}>"{url}"</span>
                <span>)</span>
              </pre>
            </div>
            <p style={{fontSize:11,color:"#86868B",margin:"7px 0 0",lineHeight:1.5}}>
              {parsed?.mode==="sheet"
                ? "Every EDS spreadsheet is already a structured JSON endpoint. No CF model, no persisted query, no auth."
                : "Every page authored in DA is available as structured JSON via html2json. Zero integration overhead."}
            </p>
          </div>

          {/* AEM CS comparison */}
          <div style={{marginBottom:22}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              <div style={{width:8,height:8,borderRadius:"50%",background:"#FF9F0A"}}/>
              <span style={{fontSize:13.5,fontWeight:700}}>AEM CS — Content Fragments + GraphQL</span>
              <span style={{fontSize:9.5,fontWeight:700,background:"#FEF3C7",color:"#92400E",padding:"2px 8px",borderRadius:4,fontFamily:mono}}>~20 lines + CF model + auth</span>
            </div>
            <div style={{background:"#1D1D1F",borderRadius:12,padding:"14px 18px",overflow:"auto",opacity:.5,maxHeight:210}}>
              <pre style={{margin:0,fontSize:10,lineHeight:1.45,fontFamily:mono,color:"#A1A1A6",whiteSpace:"pre-wrap"}}>{aemcs}</pre>
            </div>
            <p style={{fontSize:11,color:"#86868B",margin:"7px 0 0",lineHeight:1.5}}>
              Still the right choice for complex structured data with CF model governance — but that's model definition, fragment creation, persisted query registration, and auth before a single byte reaches the consumer.
            </p>
          </div>

          {/* json2html — second path (sheet mode only) */}
          {parsed?.mode==="sheet" && (
            <div style={{marginBottom:22}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:"#007AFF"}}/>
                <span style={{fontSize:13.5,fontWeight:700}}>json2html — same sheet → rendered EDS pages</span>
                <span style={{fontSize:9.5,fontWeight:700,background:"#DBEAFE",color:"#1E40AF",padding:"2px 8px",borderRadius:4,fontFamily:mono}}>Official Adobe Worker</span>
              </div>
              <div style={{background:"#1D1D1F",borderRadius:12,padding:"14px 18px",overflow:"auto"}}>
                <pre style={{margin:0,fontSize:10.5,lineHeight:1.6,fontFamily:mono,color:"#E8E8ED",whiteSpace:"pre-wrap"}}>
{`// Register once — each row becomes its own EDS page:
POST https://json2html.adobeaem.workers.dev
     /config/scdemos/courtneydemo/main

[{
  "path":     "/offers/",
  "endpoint": ".../account-offers.json",
  "arrayKey": "data",
  "pathKey":  "URL",
  "template": "/templates/offer-card.html"
}]

// Result — each row gets its own URL:
// /offers/max-rate         → Max Rate Checking
// /offers/premium-savings  → Premium Savings
// /offers/cash-rewards     → Cash Rewards
// /offers/student-checking → Student Checking`}
                </pre>
              </div>
              <p style={{fontSize:11,color:"#86868B",margin:"7px 0 0",lineHeight:1.5}}>
                Same spreadsheet — wired through the official Adobe Cloudflare Worker. Each row renders as a full EDS page at its own URL, served through CDN, SEO-indexed, personalizable by Target. Docs: <span style={{color:"#a14f2b",fontFamily:mono}}>aem.live/developer/json2html</span>
              </p>
            </div>
          )}

          {/* Row info (sheet mode) */}
          {parsed?.mode==="sheet" && parsed.rows?.length > 1 && (
            <div style={{background:"#f5f2ed",border:"1px solid rgba(161,79,43,0.2)",borderRadius:10,padding:"12px 14px",marginBottom:16}}>
              <p style={{fontSize:11,color:"#a14f2b",margin:0,fontWeight:600,fontFamily:mono}}>
                ↕ Row {activeRow+1} of {parsed.rows.length} — tap offer type buttons inside the phone to switch rows
              </p>
              <p style={{fontSize:10.5,color:"#6b5a50",margin:"4px 0 0",lineHeight:1.5}}>
                In a real app, the row selected would be driven by personalization rules, segment membership, or A/B test assignment — all resolved at the edge without a CMS query.
              </p>
            </div>
          )}

          {/* Raw JSON */}
          {rawJson && (
            <div>
              <button onClick={() => setShowRaw(!showRaw)} style={{background:"none",border:"1px solid #D1D1D6",borderRadius:8,padding:"7px 14px",fontSize:11.5,fontWeight:600,cursor:"pointer",color:"#636366"}}>
                {showRaw?"Hide":"Show"} raw JSON response
              </button>
              {showRaw && (
                <pre style={{background:"#1D1D1F",color:"#A1A1A6",borderRadius:12,padding:14,marginTop:10,fontSize:10,fontFamily:mono,overflow:"auto",maxHeight:280,lineHeight:1.5,whiteSpace:"pre-wrap",wordBreak:"break-word"}}>
                  {JSON.stringify(rawJson,null,2)}
                </pre>
              )}
            </div>
          )}
        </div>

        {/* Right — device emulator */}
        <div style={{
          width:420, flexShrink:0, display:"flex", flexDirection:"column",
          alignItems:"center", padding:"24px 20px 30px",
          background:"#EDEDF0", borderLeft:"1px solid #E5E5EA",
        }}>
          <div className="device-scaler-wrap">
            <div className="device-scaler">
              {/* devices.css iphone-x — content goes in .screen */}
              <div className="marvel-device iphone-x">
                <div className="notch">
                  <div className="camera"></div>
                  <div className="speaker"></div>
                </div>
                <div className="top-bar"></div>
                <div className="sleep"></div>
                <div className="bottom-bar"></div>
                <div className="volume"></div>
                <div className="overflow">
                  <div className="shadow shadow--tr"></div>
                  <div className="shadow shadow--tl"></div>
                  <div className="shadow shadow--br"></div>
                  <div className="shadow shadow--bl"></div>
                </div>
                <div className="inner-shadow"></div>
                <div className="screen">
                  {/* Status bar */}
                  <div style={{
                    padding:"12px 20px 4px",
                    display:"flex",justifyContent:"space-between",alignItems:"center",
                    background:"#f5f2ed",flexShrink:0,
                  }}>
                    <span style={{fontSize:13,fontWeight:700,color:"#1a1a1a",fontFamily:"-apple-system,sans-serif"}}>
                      {new Date().toLocaleTimeString([],{hour:"numeric",minute:"2-digit"})}
                    </span>
                    <div style={{display:"flex",gap:4,alignItems:"center"}}>
                      <svg width="15" height="11" viewBox="0 0 16 11"><rect x="0" y="7" width="3" height="4" rx=".7" fill="#1a1a1a"/><rect x="4" y="5" width="3" height="6" rx=".7" fill="#1a1a1a"/><rect x="8" y="2.5" width="3" height="8.5" rx=".7" fill="#1a1a1a"/><rect x="12" y="0" width="3" height="11" rx=".7" fill="#1a1a1a"/></svg>
                      <svg width="24" height="11" viewBox="0 0 24 11"><rect x=".5" y=".5" width="20" height="10" rx="2.5" fill="none" stroke="#1a1a1a" strokeWidth="1"/><rect x="22" y="3" width="2" height="5" rx="1" fill="#1a1a1a"/><rect x="2" y="2" width="13" height="7" rx="1.5" fill="#a14f2b"/></svg>
                    </div>
                  </div>

                  <PhoneScreen
                    parsed={parsed}
                    activeRow={activeRow}
                    onRowSelect={setActiveRow}
                    loading={loading}
                  />
                </div>
              </div>
            </div>
          </div>

          <p style={{fontSize:9.5,color:"#86868B",margin:"12px 0 0",fontFamily:mono,textAlign:"center",lineHeight:1.6}}>
            {parsed?.mode==="sheet" ? "Content from EDS spreadsheet (.json)" : "Content via html2json service"}
            {ts && ` · ${ts}`}
          </p>
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
