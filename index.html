// ── html2json compact format helpers ─────────────────────────────────────────
function strip(h){ return (h||"").replace(/<[^>]*>/g,"").replace(/&amp;/g,"&").replace(/&nbsp;/g," ").replace(/&ldquo;/g,'"').replace(/&rdquo;/g,'"').replace(/&rsquo;/g,"'").trim(); }
function firstTag(html,tag){ const m=(html||"").match(new RegExp(`<${tag}[^>]*>([\\s\\S]*?)<\\/${tag}>`,"i")); return m?strip(m[1]):null; }
function allTags(html,tag){ const re=new RegExp(`<${tag}[^>]*>([\\s\\S]*?)<\\/${tag}>`,"gi"); const out=[];let m; while((m=re.exec(html||""))!==null)out.push(strip(m[1])); return out; }
function cellHtmls(block){ const raw=block.content||[]; return raw.map(d=>typeof d.content==="string"?d.content:(d.innerHTML||"")); }

function parsePage(data){
  const result = { hero:null, body:"", cards:[] };
  if(!data?.content) return result;
  for(const sec of data.content){
    if(!Array.isArray(sec?.section)) continue;
    for(const row of sec.section){
      const nodes = Array.isArray(row) ? row : [row];
      for(const node of nodes){
        if(!node) continue;
        const type = node.type||node.tag||"";
        const name = (node.name||node.blockName||"").toLowerCase();
        // paragraph/h2 → body text
        if((type==="paragraph"||type==="h2")&&!result.body){
          const txt = typeof node.content==="string" ? strip(node.content) : strip(node.innerHTML||"");
          if(txt && txt.length>30) result.body = txt;
        }
        // hero block
        if(name==="hero" && !result.hero){
          const cells = cellHtmls(node);
          const html  = cells.join(" ");
          const ps    = allTags(html,"p");
          const imgM  = html.match(/src=["']([^"']+)["']/);
          const aM    = html.match(/<a[^>]*>([\s\S]*?)<\/a>/i);
          result.hero = {
            eyebrow: ps[0]||"",
            title:   firstTag(html,"h1")||firstTag(html,"h2")||ps[1]||"",
            cta:     aM?strip(aM[1]):"Get Started",
            img:     imgM?imgM[1]:null,
          };
        }
        // cards block
        if((name==="cards"||name==="columns") && result.cards.length===0){
          const cells = cellHtmls(node);
          result.cards = cells.map(cellHtml=>{
            const imgM = cellHtml.match(/src=["']([^"']+)["']/);
            const title = firstTag(cellHtml,"h3")||firstTag(cellHtml,"h2")||firstTag(cellHtml,"p")||"";
            const ps = allTags(cellHtml,"p");
            const desc = ps.find(p=>p!==title&&p.length>10)||"";
            return title ? { title, desc, img:imgM?imgM[1]:null } : null;
          }).filter(Boolean);
        }
      }
    }
  }
  // Fill gaps with fallback
  if(!result.hero)  result.hero  = PAGE_FALLBACK.hero;
  if(!result.cards.length) result.cards = PAGE_FALLBACK.cards;
  if(!result.body)  result.body  = PAGE_FALLBACK.body;
  return result;
}

  async function tryFetch(url){

    for(const p of PROXIES){ try{ const r=await fetch(p(url)); if(r.ok) return {d:await r.json(),st:"proxy"}; }catch(_){} }

              background:loading?"#E5E7EB":accentColor,color:loading?"#9CA3AF":"#fff",border:"none",
              borderRadius:10,padding:"9px 22px",fontSize:13,fontWeight:800,
              cursor:loading?"wait":"pointer",fontFamily:"'DM Sans',sans-serif",
              boxShadow:loading?"none":`0 2px 8px ${accentColor}55`,transition:"all .2s",
            }}>{loading?"Fetching…":"⟳  Fetch"}</button>
          </div>
        </div>

        {/* ── Tabs ── */}
        <div style={{display:"flex",gap:0}}>
          {[
            { id:"page",   icon:"📄", label:"Page  (html2json)",    sub:"Any EDS page → structured JSON" },
            { id:"offers", icon:"💳", label:"Offers  (Spreadsheet)", sub:"DA spreadsheet → JSON rows" },
          ].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{
              padding:"10px 20px 8px",border:"none",cursor:"pointer",
              background:"transparent",
              borderBottom: tab===t.id ? `2px solid ${t.id==="page"?B.rust:accentColor}` : "2px solid transparent",
              color: tab===t.id ? "#111827" : "#6B7280",
              fontFamily:"'DM Sans',sans-serif",textAlign:"left",transition:"all .15s",
            }}>
              <span style={{fontSize:12,fontWeight:700}}>{t.icon} {t.label}</span>
              <span style={{display:"block",fontSize:9,color:tab===t.id?"#6B7280":"#9CA3AF",fontFamily:mono,marginTop:1}}>{t.sub}</span>
            </button>
          ))}
        </div>
      </div>

      {/* ── URL bar ── */}
      <div style={{padding:"10px 32px",borderBottom:"1px solid #F3F4F6",background:"#F9FAFB"}}>
        <p style={{fontSize:11,fontFamily:mono,color:"#059669",margin:0}}>
          <span style={{color:"#6B7280"}}>const {"{"} {tab==="offers"?"data":"content"} {"}"} = await fetch(</span>
          {fetchUrl}
          <span style={{color:"#6B7280"}}>).then(r ={">"} r.json())</span>
        </p>
        {ts&&<p style={{fontSize:9,color:"#9CA3AF",margin:"3px 0 0",fontFamily:mono}}>last fetch: {ts} — edit in DA, publish, hit Fetch ↑</p>}
      </div>

      {/* ── Body ── */}
      <div style={{flex:1,display:"flex",overflow:"hidden"}}>

        {/* Left — code story */}
        <div style={{flex:"0 0 40%",padding:"24px 32px",overflowY:"auto",display:"flex",flexDirection:"column",gap:20,borderRight:"1px solid #E5E7EB"}}>

          {tab==="page" ? (
            <>
              {/* html2json story */}
              <div>
                <p style={{fontSize:12,fontWeight:700,color:"#6B7280",margin:"0 0 10px",textTransform:"uppercase",letterSpacing:".08em",fontFamily:mono}}>How it works</p>
                {[
                  { n:"01", color:"#34D399", title:"Author a page in DA", body:"Content team writes the page as a document — headings, paragraphs, blocks. Publishes to the EDS CDN as HTML." },
                  { n:"02", color:"#60A5FA", title:"Append .json to any EDS page URL", body:`The html2json worker intercepts the request and converts the page's HTML into structured JSON — blocks, headings, sections — on the fly. No separate API to build.` },
                  { n:"03", color:B.gold,    title:"Your app consumes it", body:"Native iOS app, Android app, Teams tab, kiosk, chatbot — any consumer calls the same URL with .json and gets structured data back. Same source, any render target." },
                ].map((s,i)=>(
                  <div key={i} style={{display:"flex",gap:12,marginBottom:16}}>
                    <div style={{width:28,height:28,borderRadius:8,background:s.color+"22",border:`1px solid ${s.color}44`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:2}}>
                      <span style={{fontSize:10,fontWeight:800,color:s.color,fontFamily:mono}}>{s.n}</span>
                    </div>
                    <div>
                      <p style={{fontSize:13,fontWeight:700,color:"#111827",margin:0}}>{s.title}</p>
                      <p style={{fontSize:11,color:"#6B7280",margin:"3px 0 0",lineHeight:1.5}}>{s.body}</p>
                    </div>
                  </div>
                ))}
              </div>

              {/* The fetch */}
              <div>
                <p style={{fontSize:12,fontWeight:700,color:"#6B7280",margin:"0 0 8px",textTransform:"uppercase",letterSpacing:".08em",fontFamily:mono}}>The integration</p>
                <div style={{background:"#0D1117",borderRadius:12,padding:"16px 18px",border:"1px solid rgba(255,255,255,.06)"}}>
                  <pre style={{margin:0,fontSize:12,lineHeight:1.8,fontFamily:mono,whiteSpace:"pre-wrap",wordBreak:"break-all"}}>
                    <span style={{color:"#FF7B72"}}>const </span>
                    <span style={{color:"#79C0FF"}}>{"{ content }"}</span>
                    <span style={{color:"#C9D1D9"}}> = </span>
                    <span style={{color:"#FF7B72"}}>await </span>
                    <span style={{color:"#D2A8FF"}}>fetch</span>
                    <span style={{color:"#C9D1D9"}}>(</span>
                    <span style={{color:"#A5D6FF"}}>"{PAGE_URL}"</span>
                    <span style={{color:"#C9D1D9"}}>).then(r {"=>"} r.json()){"\n\n"}</span>
                    <span style={{color:"#8B949E"}}>// content[] — the full page as typed sections{"\n"}// blocks, headings, cards — ready to render natively{"\n"}// No CF model. No persisted query. No auth.</span>
                  </pre>
                </div>
              </div>

              {/* vs AEM CS */}
              <div>
                <p style={{fontSize:12,fontWeight:700,color:"#6B7280",margin:"0 0 8px",textTransform:"uppercase",letterSpacing:".08em",fontFamily:mono}}>vs AEM CS Content Fragments</p>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  {[
                    { label:"EDS + html2json", lines:"1 line", color:"#34D399", items:["✓ Any EDS page URL + .json","✓ No CF model to define","✓ No persisted query","✓ No auth token","✓ Author in DA as a document"] },
                    { label:"AEM CS + GraphQL", lines:"~20 lines + setup", color:"#F87171", items:["✗ Define CF model first","✗ Create fragments in DAM","✗ Register persisted query","✗ Bearer auth token","✗ Separate from page authoring"] },
                  ].map((col,i)=>(
                    <div key={i} style={{background:"#0D1117",borderRadius:10,padding:"12px 14px",border:`1px solid ${col.color}22`}}>
                      <p style={{fontSize:10,fontWeight:800,color:col.color,margin:"0 0 4px",fontFamily:mono,textTransform:"uppercase",letterSpacing:".06em"}}>{col.label}</p>
                      <p style={{fontSize:9,color:"#475569",margin:"0 0 10px",fontFamily:mono}}>{col.lines}</p>
                      {col.items.map((it,ii)=><p key={ii} style={{fontSize:10.5,color:i===0?"#94A3B8":"#475569",margin:"3px 0",fontFamily:mono}}>{it}</p>)}
                    </div>
                  ))}
                </div>
              </div>

              {/* Raw JSON */}
              {pageRaw&&(
                <div>
                  <button onClick={()=>setShowPageRaw(!showPageRaw)} style={{background:"#F3F4F6",border:"1px solid #E5E7EB",borderRadius:8,padding:"6px 14px",fontSize:11,fontWeight:600,cursor:"pointer",color:"#6B7280",fontFamily:mono}}>
                    {showPageRaw?"▲ hide":"▼ show"} raw JSON response
                  </button>
                  {showPageRaw&&<pre style={{background:"#0D1117",color:"#64748B",borderRadius:12,padding:14,marginTop:10,fontSize:10,fontFamily:mono,overflow:"auto",maxHeight:260,lineHeight:1.5,whiteSpace:"pre-wrap",wordBreak:"break-word",border:"1px solid rgba(255,255,255,.06)"}}>{JSON.stringify(pageRaw,null,2)}</pre>}
                </div>
              )}
            </>
          ) : (
            <>
              {/* Offers story — unchanged */}
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <span style={{background:"#ECFDF5",color:"#059669",fontSize:9,fontWeight:800,padding:"2px 8px",borderRadius:4,fontFamily:mono,letterSpacing:".06em"}}>STEP 1</span>
                  <span style={{fontSize:14,fontWeight:700,color:"#111827"}}>One fetch call. That's the integration.</span>
                </div>
                <div style={{background:"#0D1117",borderRadius:12,padding:"16px 18px",border:"1px solid rgba(255,255,255,.06)"}}>
                  <pre style={{margin:0,fontSize:12,lineHeight:1.8,fontFamily:mono,whiteSpace:"pre-wrap",wordBreak:"break-all"}}>
                    <span style={{color:"#FF7B72"}}>const </span><span style={{color:"#79C0FF"}}>{"{ data }"}</span>
                    <span style={{color:"#C9D1D9"}}> = </span><span style={{color:"#FF7B72"}}>await </span>
                    <span style={{color:"#D2A8FF"}}>fetch</span><span style={{color:"#C9D1D9"}}>(</span>
                    <span style={{color:"#A5D6FF"}}>"{OFFERS_URL}"</span>
                    <span style={{color:"#C9D1D9"}}>).then(r {"=>"} r.json()){"\n\n"}</span>
                    <span style={{color:"#8B949E"}}>// data[] — one object per row in the DA spreadsheet{"\n"}// No Content Fragment model. No DAM. No GraphQL. No auth.{"\n"}// Every EDS project exposes its sheets as .json — OOTB.</span>
                  </pre>
                </div>
              </div>

              <div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <span style={{background:"#EFF6FF",color:"#2563EB",fontSize:9,fontWeight:800,padding:"2px 8px",borderRadius:4,fontFamily:mono,letterSpacing:".06em"}}>STEP 2</span>
                  <span style={{fontSize:14,fontWeight:700,color:"#111827"}}>One row = one Content Fragment. Already structured.</span>
                </div>
                <div style={{background:"#0D1117",borderRadius:12,padding:"16px 18px",border:"1px solid rgba(255,255,255,.06)"}}>
                  <pre style={{margin:0,fontSize:11.5,lineHeight:1.7,fontFamily:mono,whiteSpace:"pre-wrap"}}>
                    <span style={{color:"#8B949E"}}>{"// data[0]:\n"}</span>
                    <span style={{color:"#C9D1D9"}}>{"{\n"}</span>
                    {Object.entries(offerRows[activeOffer]||offerRows[0]).slice(0,6).map(([k,v])=>(
                      <span key={k}>
                        <span style={{color:"#79C0FF"}}>{"  \""}{k}{"\""}</span>
                        <span style={{color:"#C9D1D9"}}>: </span>
                        <span style={{color:"#A5D6FF"}}>{"\""+String(v).slice(0,52)+(String(v).length>52?"…":"")+"\""}</span>
                        <span style={{color:"#C9D1D9"}}>{",\n"}</span>
                      </span>
                    ))}
                    <span style={{color:"#C9D1D9"}}>{"}"}</span>
                  </pre>
                </div>
              </div>

              <div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <span style={{background:"#FFFBEB",color:"#D97706",fontSize:9,fontWeight:800,padding:"2px 8px",borderRadius:4,fontFamily:mono,letterSpacing:".06em"}}>STEP 3</span>
                  <span style={{fontSize:14,fontWeight:700,color:"#111827"}}>Edit in DA → publish → hit Fetch. Updates everywhere.</span>
                </div>
                <div style={{background:"#0D1117",borderRadius:12,padding:"16px 18px",border:"1px solid rgba(255,255,255,.06)",display:"flex",flexDirection:"column",gap:12}}>
                  {[
                    { icon:"📄", label:"Edit the spreadsheet in DA",   sub:"scdemos/courtneydemo/offers/account-offers — change any cell" },
                    { icon:"🚀", label:"Publish from DA sidebar",       sub:"One click — content hits the CDN edge instantly" },
                    { icon:"⟳",  label:"Hit Fetch above",               sub:"This tool updates. Any other app consuming that URL updates too." },
                  ].map((s,i)=>(
                    <div key={i} style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                      <span style={{fontSize:18,flexShrink:0}}>{s.icon}</span>
                      <div>
                        <p style={{fontSize:13,fontWeight:700,color:"#111827",margin:0}}>{s.label}</p>
                        <p style={{fontSize:11,color:"#6B7280",margin:"2px 0 0",lineHeight:1.4,fontFamily:mono}}>{s.sub}</p>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {offerRaw&&(
                <div>
                  <button onClick={()=>setShowOfferRaw(!showOfferRaw)} style={{background:"#F3F4F6",border:"1px solid #E5E7EB",borderRadius:8,padding:"6px 14px",fontSize:11,fontWeight:600,cursor:"pointer",color:"#6B7280",fontFamily:mono}}>
                    {showOfferRaw?"▲ hide":"▼ show"} raw JSON response
                  </button>
                  {showOfferRaw&&<pre style={{background:"#0D1117",color:"#64748B",borderRadius:12,padding:14,marginTop:10,fontSize:10,fontFamily:mono,overflow:"auto",maxHeight:260,lineHeight:1.5,whiteSpace:"pre-wrap",wordBreak:"break-word",border:"1px solid rgba(255,255,255,.06)"}}>{JSON.stringify(offerRaw,null,2)}</pre>}
                </div>
              )}
            </>
          )}
        </div>

        {/* Right — phone */}
        <div style={{flex:"0 0 60%",display:"flex",flexDirection:"column",alignItems:"center",padding:"24px 20px 28px",background:"#F9FAFB"}}>
          <PhoneFrame statusBarBg={tab==="page"?"rgba(22,33,33,0)":undefined}>
            {tab==="page"
              ? <PagePhone page={page} loading={pageLoading}/>
              : <OffersPhone rows={offerRows} active={activeOffer} onSelect={setActiveOffer} loading={offerLoading}/>
            }
          </PhoneFrame>
          <p style={{fontSize:9.5,color:"#9CA3AF",margin:"12px 0 0",fontFamily:mono,textAlign:"center",lineHeight:1.6}}>
            {tab==="page"
              ? `courtneydemo homepage · html2json${pageTs?` · ${pageTs}`:""}`
              : `${offerRows.length} offers · DA spreadsheet${offerTs?` · ${offerTs}`:""}`
            }
          </p>
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
