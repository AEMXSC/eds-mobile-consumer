/* ---- Helpers ---- */
function strip(h){ return (h||"").replace(/<[^>]*>/g,"").replace(/&amp;/g,"&").replace(/&nbsp;/g," ").trim(); }

function flattenHtml2Json(data) {
  // Format 1: body.children (standard html2json)
  if (data?.body?.children) return data.body.children;
  // Format 2: content[].section[][] (compact html2json)
  if (Array.isArray(data?.content)) {
    const items = [];
    for (const sec of data.content) {
      if (Array.isArray(sec?.section)) {
        for (const row of sec.section) {
          if (Array.isArray(row)) items.push(...row.filter(Boolean));
          else if (row) items.push(row);
        }
      } else if (sec?.tag || sec?.name || sec?.type) {
        items.push(sec);
      }
    }
    return items;
  }
  if (Array.isArray(data)) return data;
  return [];
}

/* nodeText: extract readable text from a node regardless of which field holds it */
function nodeText(it) {
  if (it.innerHTML) return strip(it.innerHTML);
  if (it.text)      return strip(it.text);
  if (typeof it.content === "string") return strip(it.content);
  return "";
}

/* blockCells: flatten compact block.content[] into array of HTML strings (one per row/card) */
function blockCells(it) {
  const raw = it.content || it.children || it.rows || [];
  if (!Array.isArray(raw)) return [];
  const cells = [];
  for (const row of raw) {
    if (typeof row === "string") { cells.push(row); continue; }
    if (row?.type === "div" || row?.tag === "div") {
      cells.push(typeof row.content === "string" ? row.content : (row.innerHTML || ""));
    } else if (Array.isArray(row)) {
      for (const cell of row)
        cells.push(typeof cell?.content === "string" ? cell.content : (cell?.innerHTML || ""));
    }
  }
  return cells;
}

/* extractTag: first match of <tag>…</tag> */
function extractTag(html, tag) {
  const m = (html||"").match(new RegExp(`<${tag}[^>]*>([\\s\\S]*?)<\\/${tag}>`, "i"));
  return m ? strip(m[1]) : null;
}

/* extractAllTags: all matches of <tag>…</tag> */
function extractAllTags(html, tag) {
  const re = new RegExp(`<${tag}[^>]*>([\\s\\S]*?)<\\/${tag}>`, "gi");
  const out = []; let m;
  while ((m = re.exec(html||"")) !== null) out.push(strip(m[1]));
  return out;
}

/* extractInnerDivs: top-level <div> contents from an HTML string */
function extractInnerDivs(html) {
  const out = []; let depth = 0, start = -1, i = 0;
  const h = html || "";
  while (i < h.length) {
    if (h.slice(i,i+4).toLowerCase() === "<div") {
      if (depth === 0) start = i;
      depth++;
      i = h.indexOf(">", i) + 1;
    } else if (h.slice(i,i+6).toLowerCase() === "</div>") {
      depth--;
      if (depth === 0 && start >= 0) {
        const inner = h.slice(start, i + 6);
        const content = inner.replace(/^<div[^>]*>/i,"").replace(/<\/div>$/i,"");
        out.push(content);
        start = -1;
      }
      i += 6;
    } else { i++; }
  }
  return out;
}

function buildSections(items) {
  const s = []; let hero = false;
  items.forEach(it => {
    if (!it) return;
    const tag  = it.tag || it.type || "";
    const name = (it.name || it.blockName || "").toLowerCase();

    /* headings / paragraphs */
    if (!hero && (tag === "h1" || it.headingLevel === 1)) {
      s.push({ t:"hero", title:nodeText(it), sub:"", body:"", stats:[], ctas:[], img:null });
      hero = true;
    } else if (tag === "h1" || tag === "h2" || it.headingLevel <= 2) {
      s.push({ t:"text", h:nodeText(it), b:"" });
    } else if ((tag === "p" || tag === "paragraph") && s.length) {
      const l = s[s.length-1], txt = nodeText(it);
      if (txt) { const k = l.t==="hero"?"sub":"b"; l[k]=((l[k]||"")+" "+txt).trim(); }
    } else if (tag === "img" && s.length && s[s.length-1].t === "hero") {
      s[s.length-1].img = it.src || it.href || null;

    /* hero block — one big div with eyebrow, h1, body p, CTAs, stats ul */
    } else if (name === "hero" && !hero) {
      const html = blockCells(it).join(" ");
      const ps = extractAllTags(html, "p");
      const eyebrow = ps[0] || "";
      const title   = extractTag(html,"h1") || extractTag(html,"h2") || ps[1] || "Hero";
      const body    = ps.find(p => p !== eyebrow && p !== title && p.length > 20) || ps[1] || "";
      const stats   = extractAllTags(html, "li");
      const ctaRe   = /<a[^>]*href=["']([^"'#/][^"']*)["'][^>]*>([\s\S]*?)<\/a>/gi;
      const ctas = []; let cm;
      while ((cm = ctaRe.exec(html)) !== null) ctas.push({ href:cm[1], label:strip(cm[2]) });
      const imgM = html.match(/src=["']([^"']+)["']/);
      s.push({ t:"hero", title, sub:eyebrow, body, stats, ctas, img:imgM?imgM[1]:null });
      hero = true;

    /* cards / columns */
    } else if (name === "cards" || name === "columns") {
      const oldRows = it.children || it.rows;
      if (Array.isArray(oldRows) && oldRows.length) {
        const ci = oldRows.map(r => {
          const c = r.columns||r.children||r||[];
          return { icon:"", title:strip(c[0]?.innerHTML||""), desc:strip(c[1]?.innerHTML||""), img:null };
        }).filter(x => x.title);
        if (ci.length) { s.push({ t:"cards", items:ci }); return; }
      }
      const ci = blockCells(it).map(cellHtml => {
        const cols = extractInnerDivs(cellHtml);
        const icon  = cols[0] ? strip(cols[0]) : "";
        const title = cols[1] ? (extractTag(cols[1],"h3")||extractTag(cols[1],"h2")||strip(cols[1])) : (extractTag(cellHtml,"h3")||extractTag(cellHtml,"h2")||"");
        const desc  = cols[2] ? strip(cols[2]) : extractTag(cellHtml,"p") || "";
        const imgM  = cellHtml.match(/src=["']([^"']+)["']/);
        return title ? { icon, title, desc, img:imgM?imgM[1]:null } : null;
      }).filter(Boolean);
      if (ci.length) s.push({ t:"cards", items:ci });

    /* revenue-motions block — numbered motions with title, tagline, desc, link */
    } else if (name === "revenue-motions") {
      const motions = blockCells(it).map(cellHtml => {
        const cols = extractInnerDivs(cellHtml);
        const num     = cols[0] ? strip(cols[0]) : "";
        const title   = extractTag(cellHtml,"h3") || extractTag(cellHtml,"h2") || "";
        const ps      = extractAllTags(cellHtml, "p");
        const tagline = ps[0] || "";
        const desc    = ps.slice(1).join(" ");
        const linkM   = cellHtml.match(/<a[^>]*>([\s\S]*?)<\/a>/i);
        const link    = linkM ? strip(linkM[1]) : "";
        return title ? { num, title, tagline, desc, link } : null;
      }).filter(Boolean);
      if (motions.length) s.push({ t:"motions", motions });

    /* verticals block — dollar amount + industry name */
    } else if (name === "verticals") {
      const items = blockCells(it).map(cellHtml => {
        const cols = extractInnerDivs(cellHtml);
        const amount   = cols[0] ? strip(cols[0]) : "";
        const industry = cols[1] ? strip(cols[1]) : strip(cellHtml);
        return (amount || industry) ? { amount, industry } : null;
      }).filter(Boolean);
      if (items.length) s.push({ t:"verticals", items });

    /* team block — name, title, practice, initials/img */
    } else if (name === "team") {
      const members = blockCells(it).map(cellHtml => {
        const cols    = extractInnerDivs(cellHtml);
        const avatar  = cols[0] || "";
        const imgM    = avatar.match(/src=["']([^"']+)["']/);
        const initials = imgM ? null : strip(avatar).slice(0,2).toUpperCase();
        const name    = cols[1] ? strip(cols[1]) : "";
        const title   = cols[2] ? strip(cols[2]) : "";
        const practice= cols[3] ? strip(cols[3]) : "";
        return name ? { img:imgM?imgM[1]:null, initials:initials||name.slice(0,2).toUpperCase(), name, title, practice } : null;
      }).filter(Boolean);
      if (members.length) s.push({ t:"team", members });

    /* any other named block — best-effort text extraction */
    } else if (name && name !== "section-metadata" && name !== "metadata") {
      const html = blockCells(it).join(" ");
      const heading = extractTag(html,"h2")||extractTag(html,"h3")||extractTag(html,"h1");
      const body    = extractAllTags(html,"p").join(" ");
      const items   = extractAllTags(html,"li");
      if (heading||body) s.push({ t:"text", h:heading||"", b:body });
      else if (items.length) s.push({ t:"list", items });
      else s.push({ t:"block", name });
    }
  });
  return s;
}

function parseResponse(data, hintMode) {
  // Sheet mode: EDS spreadsheet JSON
  if (hintMode === "sheet" || (data?.data && Array.isArray(data.data))) {
    if (data?.data?.length) return { mode:"sheet", rows:data.data };
    return SAMPLE_SHEET;
  }
  // Page mode
  const items = flattenHtml2Json(data);
  const sections = buildSections(items);
  return { mode:"page", sections: sections.length ? sections : SAMPLE_PAGE.sections };
}

/* ---- Badge colors by account type ---- */
function badgeStyle(type) {
  const t = (type||"").toLowerCase();
  if (t === "checking") return { bg:"#a14f2b", text:"#fff" };
  if (t === "savings")  return { bg:"#c5a059", text:"#1a1a1a" };
  if (t === "credit")   return { bg:"#162121", text:"#c5a059" };
  return { bg:"#1a1a1a", text:"#f5f2ed" };
}

    ? details.split(/\.\s+/).map(p => p.replace(/\.$/, "").trim()).filter(Boolean)

    <div style={{

        display:"flex",
        justifyContent:"space-between",

        {type && (
          <span style={{
            background:badge.bg, color:badge.text,

            letterSpacing:"0.1em", padding:"3px 10px", borderRadius:20,
          }}>{type}</span>
        )}
        <span style={{color:"rgba(255,255,255,0.65)",fontSize:11,marginLeft:"auto"}}>
          ★★★★★
        </span>
      </div>

      {/* Title */}
      <div style={{padding:"16px 16px 0"}}>

      {/* Offer callout */}
      {offer && (

}

/* ---- Row selector (sheet mode personalization bar) ---- */
function RowSelector({ rows, active, onSelect }) {

      padding:"8px 12px 6px",

        <button key={i} onClick={() => onSelect(i)} style={{
          flexShrink:0,
          padding:"4px 10px", borderRadius:20, border:"none",
          background: active===i ? "#a14f2b" : "rgba(161,79,43,0.12)",
          color: active===i ? "#fff" : "#a14f2b",

          fontFamily:sans, textTransform:"uppercase", letterSpacing:"0.06em",

      ))}

        marginLeft:4, fontFamily:sans, whiteSpace:"nowrap",

/* ---- Page content renderer (html2json mode) ---- */

    <div style={{padding:"80px 20px",textAlign:"center",fontFamily:sf}}>

      <p style={{fontSize:12,color:"#8a7a6e"}}>Fetching from DA…</p>
    </div>
  );
  if (!sections?.length) return (
    <div style={{padding:"80px 20px",textAlign:"center",fontFamily:sf}}>
      <p style={{fontSize:12,color:"#8a7a6e"}}>Enter a URL and hit Fetch</p>
    </div>
  );
  const serif = "'EB Garamond',georgia,serif";
  return (
    <div style={{fontFamily:sf,paddingBottom:24}}>
      {sections.map((s,i) => {

        /* ── hero ── */
        if (s.t==="hero") return (
          <div key={i} style={{background:"linear-gradient(160deg,#0f1f38 0%,#1a3550 100%)",padding:"22px 18px 16px",marginBottom:4}}>
            {s.sub && <p style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:".12em",color:"rgba(197,160,89,.8)",margin:"0 0 8px"}}>{s.sub}</p>}
            <h1 style={{fontSize:22,fontWeight:800,color:"#fff",margin:"0 0 10px",lineHeight:1.15,fontFamily:serif}}>{s.title}</h1>
            {s.body && <p style={{fontSize:11,color:"rgba(255,255,255,.7)",lineHeight:1.5,margin:"0 0 14px"}}>{s.body}</p>}
            {s.ctas?.length>0 && (
              <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
                {s.ctas.map((c,ci)=>(
                  <div key={ci} style={{
                    background:ci===0?"#c5a059":"transparent",
                    border:ci===0?"none":"1px solid rgba(197,160,89,.5)",
                    color:ci===0?"#0f1f38":"#c5a059",
                    borderRadius:8,padding:"7px 14px",fontSize:11,fontWeight:700,
                  }}>{c.label}</div>
                ))}
              </div>
            )}
            {s.stats?.length>0 && (
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {s.stats.map((st,si)=>(
                  <div key={si} style={{background:"rgba(255,255,255,.08)",borderRadius:6,padding:"4px 8px",fontSize:10,color:"rgba(255,255,255,.75)",fontWeight:600}}>{st}</div>
                ))}
              </div>
            )}
          </div>
        );

        /* ── text / heading ── */
        if (s.t==="text") return (
          <div key={i} style={{padding:"12px 18px 4px"}}>
            {s.h && <h2 style={{fontSize:14,fontWeight:700,color:"#1a1a1a",margin:"0 0 4px",fontFamily:serif}}>{s.h}</h2>}
            {s.b && <p style={{fontSize:11.5,color:"#4a3a2e",lineHeight:1.6,margin:0}}>{s.b}</p>}
          </div>
        );

        /* ── cards ── */
        if (s.t==="cards") return (
          <div key={i} style={{padding:"4px 14px 8px"}}>
            {s.items.map((c,ci)=>(
              <div key={ci} style={{display:"flex",gap:10,alignItems:"center",padding:"9px 0",borderBottom:ci<s.items.length-1?"1px solid rgba(197,160,89,.2)":"none"}}>
                {c.img

                </div>
                <span style={{color:"#c5a059",fontSize:14,fontWeight:700}}>›</span>
              </div>
            ))}
          </div>
        );

        /* ── revenue motions ── */
        if (s.t==="motions") return (
          <div key={i} style={{padding:"4px 14px 8px"}}>
            {s.motions.map((m,mi)=>(
              <div key={mi} style={{padding:"10px 0",borderBottom:mi<s.motions.length-1?"1px solid rgba(197,160,89,.2)":"none"}}>
                <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                  <div style={{
                    minWidth:26,height:26,borderRadius:6,
                    background:"#c5a059",color:"#0f1f38",
                    fontSize:11,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",
                    flexShrink:0,marginTop:1,
                  }}>{m.num||String(mi+1).padStart(2,"0")}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <p style={{fontSize:12.5,fontWeight:700,color:"#1a1a1a",margin:0,fontFamily:serif}}>{m.title}</p>
                    {m.tagline && <p style={{fontSize:10.5,color:"#a14f2b",margin:"2px 0 0",fontStyle:"italic"}}>{m.tagline}</p>}
                    {m.desc && <p style={{fontSize:10.5,color:"#6b5a50",margin:"4px 0 0",lineHeight:1.45}}>{m.desc}</p>}
                    {m.link && <p style={{fontSize:10,color:"#c5a059",margin:"4px 0 0",fontWeight:700}}>{m.link} →</p>}
                  </div>
                </div>
              </div>
            ))}
          </div>
        );

        /* ── verticals ── */
        if (s.t==="verticals") return (
          <div key={i} style={{padding:"4px 14px 8px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            {s.items.map((v,vi)=>(
              <div key={vi} style={{background:"rgba(161,79,43,.06)",borderRadius:10,padding:"8px 10px",border:"1px solid rgba(197,160,89,.2)"}}>
                <p style={{fontSize:13,fontWeight:800,color:"#a14f2b",margin:0,fontFamily:serif}}>{v.amount}</p>
                <p style={{fontSize:10,color:"#4a3a2e",margin:"2px 0 0",lineHeight:1.3}}>{v.industry}</p>
              </div>
            ))}
          </div>
        );

        /* ── team ── */
        if (s.t==="team") return (
          <div key={i} style={{padding:"4px 14px 8px"}}>
            {s.members.map((m,mi)=>(
              <div key={mi} style={{display:"flex",gap:10,alignItems:"center",padding:"8px 0",borderBottom:mi<s.members.length-1?"1px solid rgba(197,160,89,.2)":"none"}}>
                {m.img
                  ? <img src={m.img} alt={m.name} style={{width:38,height:38,borderRadius:19,objectFit:"cover",flexShrink:0}}/>
                  : <div style={{width:38,height:38,borderRadius:19,background:"linear-gradient(135deg,#a14f2b,#c5a059)",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,color:"#fff"}}>{m.initials}</div>
                }
                <div style={{flex:1,minWidth:0}}>
                  <p style={{fontSize:12.5,fontWeight:700,color:"#1a1a1a",margin:0}}>{m.name}</p>
                  <p style={{fontSize:10,color:"#8a7a6e",margin:"1px 0 0",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.title}{m.practice&&` · ${m.practice}`}</p>
                </div>
              </div>
            ))}
          </div>
        );

        /* ── list ── */
        if (s.t==="list") return (
          <div key={i} style={{padding:"4px 18px 8px"}}>
            {s.items.map((item,ii)=>(
              <div key={ii} style={{display:"flex",gap:8,alignItems:"flex-start",marginBottom:5}}>
                <span style={{color:"#c5a059",fontWeight:700,flexShrink:0}}>·</span>
                <span style={{fontSize:11.5,color:"#4a3a2e",lineHeight:1.45}}>{item}</span>
              </div>
            ))}
          </div>
        );

        /* ── cta ── */
        if (s.t==="cta") return (
          <div key={i} style={{padding:"4px 18px 14px",textAlign:"center"}}>
            {s.text && <p style={{fontSize:13,color:"#4a3a2e",margin:"0 0 10px",fontWeight:500}}>{s.text}</p>}
            <div style={{background:"linear-gradient(135deg,#a14f2b,#c5a059)",color:"#fff",borderRadius:12,padding:"11px 22px",fontSize:13,fontWeight:700,display:"inline-block"}}>{s.btn}</div>
          </div>
        );

        /* ── unknown block fallback ── */
        if (s.t==="block") return (
          <div key={i} style={{padding:"0 18px",marginBottom:6}}>
            <div style={{background:"rgba(161,79,43,.06)",borderRadius:8,padding:"6px 10px",border:"1px solid rgba(161,79,43,.12)"}}>
              <span style={{fontSize:9,fontWeight:700,color:"#a14f2b",textTransform:"uppercase",letterSpacing:".06em"}}>{s.name}</span>
            </div>
          </div>
        );
        return null;
      })}
    </div>
  );
}

/* ---- Phone screen content (dispatches by mode) ---- */
function PhoneScreen({ parsed, activeRow, onRowSelect, loading }) {
  if (loading) {
    return (
      <div style={{padding:"80px 20px",textAlign:"center"}}>
        <div style={{width:26,height:26,border:"3px solid #e8e0d8",borderTopColor:"#a14f2b",borderRadius:"50%",animation:"spin .7s linear infinite",margin:"0 auto 12px"}}/>
        <p style={{fontSize:12,color:"#8a7a6e",fontFamily:"Montserrat,sans-serif"}}>Fetching…</p>
      </div>
    );
  }

  if (!parsed) {
    return (
      <div style={{padding:"80px 20px",textAlign:"center"}}>
        <p style={{fontSize:12,color:"#8a7a6e",fontFamily:"Montserrat,sans-serif"}}>Hit Fetch to load content</p>
      </div>
    );
  }

  if (parsed.mode === "sheet") {
    const rows = parsed.rows || [];
    const row  = rows[activeRow] || rows[0] || {};
    return (
      <div style={{height:"100%",display:"flex",flexDirection:"column"}}>
        {rows.length > 1 && (
          <RowSelector rows={rows} active={activeRow} onSelect={onRowSelect} />
        )}
        <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
          <OfferCard row={row} />
        </div>
      </div>
    );
  }

  // Page mode
  return (
    <div style={{height:"100%",overflowY:"auto",WebkitOverflowScrolling:"touch"}}>
      <PageUI sections={parsed.sections} loading={false} />
    </div>
  );
}

  const [parsed,     setParsed]     = useState(SAMPLE_SHEET);
  const [activeRow,  setActiveRow]  = useState(0);
  const [loading,    setLoading]    = useState(false);
  const [status,     setStatus]     = useState("cached");
  const [ts,         setTs]         = useState(null);
  const [rawJson,    setRawJson]    = useState(null);
  const [showRaw,    setShowRaw]    = useState(false);
  const [viewMode,   setViewMode]   = useState("app"); // "app" | "site"

  // derive the site URL for the active preset
  const activeSiteUrl = PRESETS.find(p => p.id === active)?.siteUrl || null;

  const mono = "'DM Mono',monospace";

  const doFetch = useCallback(async () => {
    setLoading(true); setStatus(null);
    const u = url.trim();
    const hint = hintMode;

    const tryParse = (d) => {
      try { return parseResponse(d, hint); } catch(_) { return null; }
    };

    // Direct fetch
    try {
      const r = await fetch(u, { headers:{ accept:"application/json" } });
      if (r.ok) {
        const d = await r.json();
        const p = tryParse(d);
        if (p) {
          setRawJson(d); setParsed(p); setActiveRow(0);
          setTs(new Date().toLocaleTimeString()); setStatus("live");
          setLoading(false); return;
        }
      }
    } catch(_) {}

    // Proxy fallback
    for (const proxy of PROXIES) {
      try {
        const r = await fetch(proxy(u), { headers:{ accept:"application/json" } });
        if (r.ok) {
          const raw = await r.text();
          const d = JSON.parse(raw);
          const p = tryParse(d);
          if (p) {
            setRawJson(d); setParsed(p); setActiveRow(0);
            setTs(new Date().toLocaleTimeString()); setStatus("proxy");
            setLoading(false); return;
          }
        }
      } catch(_) {}
    }

    // Fallback to sample
    const fallback = hint === "sheet" ? SAMPLE_SHEET : SAMPLE_PAGE;
    setParsed(fallback); setActiveRow(0);
    setTs(new Date().toLocaleTimeString() + " (cached)"); setStatus("cached");
    setLoading(false);

                        </span>
                        <div style={{display:"flex",gap:4,alignItems:"center"}}>
                          <svg width="15" height="11" viewBox="0 0 16 11"><rect x="0" y="7" width="3" height="4" rx=".7" fill="#1a1a1a"/><rect x="4" y="5" width="3" height="6" rx=".7" fill="#1a1a1a"/><rect x="8" y="2.5" width="3" height="8.5" rx=".7" fill="#1a1a1a"/><rect x="12" y="0" width="3" height="11" rx=".7" fill="#1a1a1a"/></svg>
                          <svg width="24" height="11" viewBox="0 0 24 11"><rect x=".5" y=".5" width="20" height="10" rx="2.5" fill="none" stroke="#1a1a1a" strokeWidth="1"/><rect x="22" y="3" width="2" height="5" rx="1" fill="#1a1a1a"/><rect x="2" y="2" width="13" height="7" rx="1.5" fill="#a14f2b"/></svg>
                        </div>
                      </div>
                      <PhoneScreen
                        parsed={parsed}
                        activeRow={activeRow}
                        onRowSelect={setActiveRow}
                        loading={loading}
                      />
                    </>
                  )}

                </div>
              </div>
            </div>
          </div>

          <p style={{fontSize:9.5,color:"#86868B",margin:"12px 0 0",fontFamily:mono,textAlign:"center",lineHeight:1.6}}>
            {viewMode==="site"
              ? `Live site · ${activeSiteUrl||""}`
              : parsed?.mode==="sheet" ? "Content from EDS spreadsheet (.json)" : "Content via html2json service"
            }
            {viewMode==="app" && ts && ` · ${ts}`}
          </p>
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
