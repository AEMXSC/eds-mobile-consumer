<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDS Offers — Live from DA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/marvelapp/devices.css@master/assets/devices.min.css">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body,#root{height:100%}
  body{font-family:'DM Sans',-apple-system,sans-serif;background:#0F172A;color:#F8FAFC}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .marvel-device .screen{overflow-y:auto !important;background:#fff !important}
  .device-scaler{transform:scale(0.78);transform-origin:top center}
  .device-scaler-wrap{height:634px;overflow:hidden;display:flex;justify-content:center}
</style>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback } = React;

const OFFERS_URL = "https://main--courtneydemo--scdemos.aem.page/offers/account-offers.json";
const PROXIES = [
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
];

// Fallback so the demo works even before fetching
const FALLBACK = [
  { Title:"Max Rate Checking", "Account Type":"Checking", Offer:"Earn 2.00% APY + $300 bonus when you open and fund a new account", Details:"No monthly fees with $1,500 minimum balance. Free ATM withdrawals nationwide. Mobile deposit available. FDIC insured.", "CTA Label":"Open Account", URL:"/offers/max-rate" },
  { Title:"Premium Savings",   "Account Type":"Savings",  Offer:"4.25% APY on all balances over $10,000",                           Details:"No minimum to open. Automatic round-up savings. Competitive rates guaranteed for 12 months. FDIC insured.",           "CTA Label":"Start Saving",   URL:"/offers/premium-savings" },
  { Title:"Cash Rewards Mastercard","Account Type":"Credit", Offer:"Unlimited 2% cash back on every purchase, every day",            Details:"No annual fee. 0% intro APR for 15 months. No foreign transaction fees. Fraud protection included.",                  "CTA Label":"Apply Now",      URL:"/offers/cash-rewards" },
  { Title:"Student Checking",  "Account Type":"Student",  Offer:"No monthly fees for students under 25 — guaranteed",               Details:"Free first order of checks. No overdraft fees on first 3 occurrences. Campus ATM access. Mobile banking with Zelle.",  "CTA Label":"Open Free Account", URL:"/offers/student-checking" },
];

const ACCENT = { Checking:"#1A4A8A", Savings:"#0D6E4F", Credit:"#6B21A8", Student:"#0F4C75" };
const BADGE  = { Checking:"#EFF6FF", Savings:"#ECFDF5", Credit:"#FAF5FF", Student:"#E0F2FE" };
const BDTXT  = { Checking:"#1D4ED8", Savings:"#065F46", Credit:"#6B21A8", Student:"#0369A1" };

function getAccent(type) { return ACCENT[type] || "#1A4A8A"; }
function getBadge(type)  { return { bg:BADGE[type]||"#F1F5F9", txt:BDTXT[type]||"#334155" }; }

/* ── Offer Card ── */
function OfferCard({ row }) {
  const type    = row["Account Type"] || row.type || "Checking";
  const title   = row.Title   || row.title   || "";
  const offer   = row.Offer   || row.offer   || row.Description || "";
  const details = row.Details || row.details || "";
  const cta     = row["CTA Label"] || row.CTA || "Learn More";
  const accent  = getAccent(type);
  const badge   = getBadge(type);

  const bullets = details
    ? details.split(/\.\s+/).map(s => s.replace(/\.$/,"").trim()).filter(Boolean)
    : [];

  return (
    <div style={{margin:"14px 12px",borderRadius:20,overflow:"hidden",boxShadow:"0 8px 32px rgba(0,0,0,0.12)"}}>
      {/* Header */}
      <div style={{background:accent,padding:"18px 18px 14px"}}>
        <span style={{background:badge.bg,color:badge.txt,fontSize:9,fontWeight:800,textTransform:"uppercase",letterSpacing:".1em",padding:"3px 10px",borderRadius:20}}>
          {type}
        </span>
        <h2 style={{fontSize:18,fontWeight:800,color:"#fff",margin:"10px 0 6px",lineHeight:1.2,fontFamily:"'DM Sans',sans-serif"}}>
          {title}
        </h2>
        <p style={{fontSize:12,color:"rgba(255,255,255,.8)",margin:0,lineHeight:1.4}}>{offer}</p>
      </div>

      {/* Body */}
      <div style={{background:"#fff",padding:"14px 18px"}}>
        {bullets.map((b,i) => (
          <div key={i} style={{display:"flex",gap:8,alignItems:"flex-start",marginBottom:8}}>
            <span style={{color:accent,fontWeight:700,flexShrink:0,fontSize:13,marginTop:1}}>✓</span>
            <span style={{fontSize:12,color:"#374151",lineHeight:1.45}}>{b}</span>
          </div>
        ))}

        {/* CTA */}
        <div style={{
          marginTop:14,background:accent,color:"#fff",borderRadius:12,
          padding:"13px",textAlign:"center",fontSize:13,fontWeight:700,
          letterSpacing:".04em",cursor:"pointer",
        }}>{cta}</div>
      </div>
    </div>
  );
}

/* ── Offer List (all rows, mini) ── */
function OfferList({ rows, active, onSelect }) {
  return (
    <div style={{padding:"10px 12px 4px",borderBottom:"1px solid #F1F5F9",background:"#F8FAFC",flexShrink:0}}>
      <p style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:".1em",color:"#94A3B8",marginBottom:7,fontFamily:"'DM Mono',monospace"}}>
        Personalization engine picked:
      </p>
      <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
        {rows.map((r,i) => {
          const type = r["Account Type"]||"";
          const ac = getAccent(type);
          return (
            <button key={i} onClick={() => onSelect(i)} style={{
              padding:"4px 10px",borderRadius:20,border:"none",cursor:"pointer",
              background: active===i ? ac : "#E2E8F0",
              color: active===i ? "#fff" : "#64748B",
              fontSize:10,fontWeight:700,fontFamily:"'DM Mono',monospace",
              transition:"all .15s",
            }}>{r.Title||`Offer ${i+1}`}</button>
          );
        })}
      </div>
    </div>
  );
}

/* ── Phone Screen ── */
function PhoneScreen({ rows, active, onSelect, loading }) {
  if (loading) return (
    <div style={{padding:"80px 20px",textAlign:"center"}}>
      <div style={{width:24,height:24,border:"3px solid #E2E8F0",borderTopColor:"#1A4A8A",borderRadius:"50%",animation:"spin .7s linear infinite",margin:"0 auto 12px"}}/>
      <p style={{fontSize:11,color:"#94A3B8",fontFamily:"'DM Sans',sans-serif"}}>Fetching from DA…</p>
    </div>
  );
  if (!rows.length) return (
    <div style={{padding:"80px 20px",textAlign:"center"}}>
      <p style={{fontSize:11,color:"#94A3B8",fontFamily:"'DM Sans',sans-serif"}}>Hit Fetch to load</p>
    </div>
  );
  return (
    <div style={{height:"100%",display:"flex",flexDirection:"column"}}>
      {rows.length > 1 && <OfferList rows={rows} active={active} onSelect={onSelect}/>}
      <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",padding:"4px 0 16px"}}>
        <OfferCard row={rows[active]||rows[0]}/>
      </div>
    </div>
  );
}

/* ── Main ── */
function App() {
  const [rows,      setRows]      = useState(FALLBACK);
  const [active,    setActive]    = useState(0);
  const [loading,   setLoading]   = useState(false);
  const [status,    setStatus]    = useState("sample");
  const [ts,        setTs]        = useState(null);
  const [rawJson,   setRawJson]   = useState(null);
  const [showRaw,   setShowRaw]   = useState(false);
  const mono = "'DM Mono',monospace";

  const doFetch = useCallback(async () => {
    setLoading(true); setStatus(null);
    let d = null, st = "live";
    try {
      const r = await fetch(OFFERS_URL, { headers:{ accept:"application/json" } });
      if (r.ok) d = await r.json();
    } catch(_) {}
    if (!d) {
      for (const p of PROXIES) {
        try { const r = await fetch(p(OFFERS_URL)); if (r.ok) { d = await r.json(); st = "proxy"; break; } } catch(_) {}
      }
    }
    if (d?.data?.length) {
      setRows(d.data); setRawJson(d); setActive(0);
      setTs(new Date().toLocaleTimeString()); setStatus(st);
    } else {
      setStatus("error"); setTs(new Date().toLocaleTimeString());
    }
    setLoading(false);
  }, []);

  const currentRow = rows[active] || rows[0] || {};
  const accent = getAccent(currentRow["Account Type"]);

  return (
    <div style={{minHeight:"100vh",background:"#0F172A",display:"flex",flexDirection:"column"}}>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>

      {/* Header */}
      <div style={{padding:"18px 32px 16px",borderBottom:"1px solid rgba(255,255,255,.07)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <h1 style={{fontSize:18,fontWeight:800,letterSpacing:"-0.03em",color:"#F8FAFC",margin:0}}>
              EDS Offers — Live from DA
            </h1>
            <p style={{fontSize:11,color:"#64748B",margin:"3px 0 0",fontFamily:mono}}>
              {OFFERS_URL}
            </p>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            {status && (
              <span style={{
                fontSize:10,fontFamily:mono,fontWeight:700,padding:"4px 10px",borderRadius:6,
                letterSpacing:".05em",textTransform:"uppercase",
                background: status==="live"?"rgba(16,185,129,.15)":status==="proxy"?"rgba(245,158,11,.15)":status==="sample"?"rgba(100,116,139,.15)":"rgba(239,68,68,.15)",
                color:       status==="live"?"#34D399":status==="proxy"?"#FBBF24":status==="sample"?"#94A3B8":"#F87171",
                border:      `1px solid ${status==="live"?"rgba(52,211,153,.3)":status==="proxy"?"rgba(251,191,36,.3)":status==="sample"?"rgba(148,163,184,.2)":"rgba(248,113,113,.3)"}`,
              }}>
                {status==="live"?"● live":status==="proxy"?"● via proxy":status==="sample"?"● sample data":"● fetch failed"}
              </span>
            )}
            <button onClick={doFetch} disabled={loading} style={{
              background: loading ? "#1E293B" : accent,
              color:"#fff",border:"none",borderRadius:10,
              padding:"10px 24px",fontSize:14,fontWeight:800,
              cursor:loading?"wait":"pointer",fontFamily:"'DM Sans',sans-serif",
              letterSpacing:"-.01em",transition:"background .2s",
              boxShadow: loading ? "none" : `0 0 20px ${accent}55`,
            }}>{loading ? "Fetching…" : "⟳  Fetch"}</button>
          </div>
        </div>
        {ts && <p style={{fontSize:10,color:"#475569",margin:"8px 0 0",fontFamily:mono}}>Last fetch: {ts} — edit in DA, publish, hit Fetch ↑</p>}
      </div>

      {/* Body */}
      <div style={{flex:1,display:"flex",overflow:"hidden"}}>

        {/* Left — the code story */}
        <div style={{flex:1,padding:"28px 32px",overflowY:"auto",display:"flex",flexDirection:"column",gap:24}}>

          {/* Step 1 — The fetch */}
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
              <span style={{background:"#1E293B",color:"#34D399",fontSize:9,fontWeight:800,padding:"2px 8px",borderRadius:4,fontFamily:mono,letterSpacing:".06em"}}>STEP 1</span>
              <span style={{fontSize:14,fontWeight:700,color:"#F1F5F9"}}>One fetch call. That's the integration.</span>
            </div>
            <div style={{background:"#0D1117",borderRadius:12,padding:"18px 20px",border:"1px solid rgba(255,255,255,.06)"}}>
              <pre style={{margin:0,fontSize:13,lineHeight:1.8,fontFamily:mono,whiteSpace:"pre-wrap",wordBreak:"break-all"}}>
                <span style={{color:"#FF7B72"}}>const </span>
                <span style={{color:"#79C0FF"}}>{"{ data }"}</span>
                <span style={{color:"#C9D1D9"}}> = </span>
                <span style={{color:"#FF7B72"}}>await </span>
                <span style={{color:"#D2A8FF"}}>fetch</span>
                <span style={{color:"#C9D1D9"}}>(</span>
                <span style={{color:"#A5D6FF"}}>"{OFFERS_URL}"</span>
                <span style={{color:"#C9D1D9"}}>)</span>
                <span style={{color:"#FF7B72"}}>.then</span>
                <span style={{color:"#C9D1D9"}}>(r => r.json()){"\n\n"}</span>
                <span style={{color:"#8B949E"}}>// data[] — one object per row in the DA spreadsheet{"\n"}// No Content Fragment model. No DAM. No GraphQL. No auth token.{"\n"}// Every EDS project exposes its sheets as .json — OOTB.</span>
              </pre>
            </div>
          </div>

          {/* Step 2 — What comes back */}
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
              <span style={{background:"#1E293B",color:"#79C0FF",fontSize:9,fontWeight:800,padding:"2px 8px",borderRadius:4,fontFamily:mono,letterSpacing:".06em"}}>STEP 2</span>
              <span style={{fontSize:14,fontWeight:700,color:"#F1F5F9"}}>One row = one Content Fragment. Already structured.</span>
            </div>
            <div style={{background:"#0D1117",borderRadius:12,padding:"18px 20px",border:"1px solid rgba(255,255,255,.06)"}}>
              <pre style={{margin:0,fontSize:11.5,lineHeight:1.7,fontFamily:mono,color:"#8B949E",whiteSpace:"pre-wrap"}}>
                <span style={{color:"#8B949E"}}>{"// data[0] — exactly one row from the spreadsheet:\n"}</span>
                <span style={{color:"#C9D1D9"}}>{"{\n"}</span>
                {Object.entries(currentRow).slice(0,6).map(([k,v])=>(
                  <span key={k}>
                    <span style={{color:"#79C0FF"}}>{"  \""}{k}{"\""}</span>
                    <span style={{color:"#C9D1D9"}}>: </span>
                    <span style={{color:"#A5D6FF"}}>{"\""+String(v).slice(0,55)+(String(v).length>55?"…":"")+"\""}</span>
                    <span style={{color:"#C9D1D9"}}>{",\n"}</span>
                  </span>
                ))}
                <span style={{color:"#C9D1D9"}}>{"}"}</span>
              </pre>
            </div>
          </div>

          {/* Step 3 — The live loop */}
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
              <span style={{background:"#1E293B",color:"#FBBF24",fontSize:9,fontWeight:800,padding:"2px 8px",borderRadius:4,fontFamily:mono,letterSpacing:".06em"}}>STEP 3</span>
              <span style={{fontSize:14,fontWeight:700,color:"#F1F5F9"}}>Edit in DA → publish → hit Fetch. Both update.</span>
            </div>
            <div style={{background:"#0D1117",borderRadius:12,padding:"18px 20px",border:"1px solid rgba(255,255,255,.06)",display:"flex",flexDirection:"column",gap:12}}>
              {[
                { icon:"📄", label:"Edit the spreadsheet",  sub:"da.live → scdemos/courtneydemo/offers/account-offers → change any cell" },
                { icon:"🚀", label:"Publish from DA",        sub:"One click in the DA sidebar — content goes live to the CDN edge" },
                { icon:"⟳",  label:"Hit Fetch above",        sub:"This tool re-fetches. Phone card updates. Website updates. Any app updates." },
              ].map((s,i) => (
                <div key={i} style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                  <span style={{fontSize:20,flexShrink:0,marginTop:1}}>{s.icon}</span>
                  <div>
                    <p style={{fontSize:13,fontWeight:700,color:"#F1F5F9",margin:0}}>{s.label}</p>
                    <p style={{fontSize:11,color:"#64748B",margin:"3px 0 0",lineHeight:1.4,fontFamily:mono}}>{s.sub}</p>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Raw JSON toggle */}
          {rawJson && (
            <div>
              <button onClick={() => setShowRaw(!showRaw)} style={{
                background:"#1E293B",border:"1px solid rgba(255,255,255,.08)",borderRadius:8,
                padding:"7px 14px",fontSize:11,fontWeight:600,cursor:"pointer",
                color:"#94A3B8",fontFamily:mono,
              }}>{showRaw?"▲ hide":"▼ show"} raw JSON response</button>
              {showRaw && (
                <pre style={{background:"#0D1117",color:"#64748B",borderRadius:12,padding:16,marginTop:10,fontSize:10,fontFamily:mono,overflow:"auto",maxHeight:280,lineHeight:1.5,whiteSpace:"pre-wrap",wordBreak:"break-word",border:"1px solid rgba(255,255,255,.06)"}}>
                  {JSON.stringify(rawJson,null,2)}
                </pre>
              )}
            </div>
          )}
        </div>

        {/* Right — phone */}
        <div style={{
          width:400,flexShrink:0,display:"flex",flexDirection:"column",
          alignItems:"center",padding:"28px 20px 32px",
          borderLeft:"1px solid rgba(255,255,255,.06)",
        }}>
          <div className="device-scaler-wrap">
            <div className="device-scaler">
              <div className="marvel-device iphone-x">
                <div className="notch"><div className="camera"></div><div className="speaker"></div></div>
                <div className="top-bar"></div>
                <div className="sleep"></div>
                <div className="bottom-bar"></div>
                <div className="volume"></div>
                <div className="overflow">
                  <div className="shadow shadow--tr"></div>
                  <div className="shadow shadow--tl"></div>
                  <div className="shadow shadow--br"></div>
                  <div className="shadow shadow--bl"></div>
                </div>
                <div className="inner-shadow"></div>
                <div className="screen">
                  {/* status bar */}
                  <div style={{padding:"12px 22px 6px",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0,background:"#fff"}}>
                    <span style={{fontSize:13,fontWeight:700,color:"#111",fontFamily:"-apple-system,sans-serif"}}>
                      {new Date().toLocaleTimeString([],{hour:"numeric",minute:"2-digit"})}
                    </span>
                    <div style={{display:"flex",gap:4,alignItems:"center"}}>
                      <svg width="15" height="11" viewBox="0 0 16 11"><rect x="0" y="7" width="3" height="4" rx=".7" fill="#111"/><rect x="4" y="5" width="3" height="6" rx=".7" fill="#111"/><rect x="8" y="2.5" width="3" height="8.5" rx=".7" fill="#111"/><rect x="12" y="0" width="3" height="11" rx=".7" fill="#111"/></svg>
                      <svg width="24" height="11" viewBox="0 0 24 11"><rect x=".5" y=".5" width="20" height="10" rx="2.5" fill="none" stroke="#111" strokeWidth="1"/><rect x="22" y="3" width="2" height="5" rx="1" fill="#111"/><rect x="2" y="2" width="13" height="7" rx="1.5" fill={accent}/></svg>
                    </div>
                  </div>
                  <PhoneScreen rows={rows} active={active} onSelect={setActive} loading={loading}/>
                </div>
              </div>
            </div>
          </div>
          <p style={{fontSize:9.5,color:"#475569",margin:"14px 0 0",fontFamily:mono,textAlign:"center",lineHeight:1.6}}>
            Data from EDS spreadsheet (DA) · {rows.length} offer{rows.length!==1?"s":""}{ts&&` · ${ts}`}
          </p>
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
